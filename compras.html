<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Compras — Despensa de Bordo</title>
    <link rel="stylesheet" href="css/cardapio.css">
    <script src="js/cardapio.js" defer></script>
  </head>
  <body data-page="shopping">
    <header class="site-header no-print">
      <div class="shell header-inner">
        <a class="brand" href="cardapio.html"><span class="brand-mark" aria-hidden="true">≈</span><span>Despensa de Bordo</span></a>
        <p class="eyebrow">Lista consolidada</p>
      </div>
    </header>
    <main class="shell page-main shopping-page">
      <div class="shopping-toolbar no-print">
        <a class="back-link" href="cardapio.html">← Alterar planejamento</a>
        <div class="toolbar-actions">
          <button id="print-list" class="button button-secondary" type="button">Imprimir</button>
        </div>
      </div>

      <header class="shopping-heading">
        <p class="kicker">Expedição de canoagem</p>
        <h1>Lista de compras</h1>
        <div id="trip-summary" class="trip-summary"></div>
      </header>

      <div id="shopping-list" class="shopping-list" aria-live="polite">
        <p class="loading">Calculando a lista…</p>
      </div>

      <footer class="print-footer">Despensa de Bordo · lista gerada para a expedição</footer>
    </main>
  </body>
</html>
