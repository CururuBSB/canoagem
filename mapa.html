<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Visualização da Trilha</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html, body, #map {
    margin: 0;
    width: 100%;
    height: 100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const line =
    JSON.parse(
        sessionStorage.getItem("previewTrack")
    );

const map =
    L.map("map");

const greenIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

const redIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

L.tileLayer(
    "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
    }
).addTo(map);

const coords =
    line.coordinates.map(
        p => [p.latitude, p.longitude]
    );

const polyline =
    L.polyline(
        coords,
        {
            color: "blue",
            weight: 4
        }
    ).addTo(map);

const first =
    line.coordinates[0];

const last =
    line.coordinates[
        line.coordinates.length - 1
    ];

L.marker(
    [first.latitude, first.longitude], { icon: greenIcon }
)
.addTo(map)
.bindPopup(`
<b>Início</b><br>
${line.name}<br>
${first.latitude.toFixed(6)},
${first.longitude.toFixed(6)}
`);

L.marker(
    [last.latitude, last.longitude], { icon: redIcon }
)
.addTo(map)
.bindPopup(`
<b>Fim</b><br>
${last.latitude.toFixed(6)},
${last.longitude.toFixed(6)}
`);

map.fitBounds(
    polyline.getBounds()
);

</script>

</body>
</html>
