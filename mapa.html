<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Visualização da Trilha</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html, body, #map {
    margin: 0;
    width: 100%;
    height: 100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const line =
    JSON.parse(
        sessionStorage.getItem("previewTrack")
    );

const map =
    L.map("map");

L.tileLayer(
    "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
    }
).addTo(map);

const coords =
    line.coordinates.map(
        p => [p.latitude, p.longitude]
    );

const polyline =
    L.polyline(
        coords,
        {
            color: "blue",
            weight: 4
        }
    ).addTo(map);

const first =
    line.coordinates[0];

const last =
    line.coordinates[
        line.coordinates.length - 1
    ];

L.marker(
    [first.latitude, first.longitude]
)
.addTo(map)
.bindPopup("Início");

L.marker(
    [last.latitude, last.longitude]
)
.addTo(map)
.bindPopup("Fim");

map.fitBounds(
    polyline.getBounds()
);

</script>

</body>
</html>
